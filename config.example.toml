# Copy this file to `config.toml` and fill in your keys.
# Anything left blank falls back to an environment variable.

[keys]
# Get a Soniox key at https://console.soniox.com  (falls back to $SONIOX_API_KEY)
soniox = ""
# Anthropic key for cleanup (falls back to $ANTHROPIC_API_KEY). Leave blank to
# disable LLM cleanup entirely and use raw transcripts.
anthropic = ""

[stt]
model = "stt-rt-v5"
sample_rate = 16000
# Bias the recognizer toward these languages. This is what makes mid-sentence
# 中/英 switching work. Add more as needed.
language_hints = ["en", "zh"]

[hotkey]
# key   — activation key. "alt_r" = Right Alt. Also: single chars ("`"),
#         named keys (f9, f8, scroll_lock, pause), or "right_alt" / "ralt".
# mode  — "toggle": press once to start, press again to stop + insert (Typeless-style).
#         "hold":   walkie-talkie — hold to talk, release to insert.
key = "alt_r"
mode = "toggle"

[inject]
# "paste" = set clipboard + Ctrl+V (robust, handles Chinese, default).
# "type"  = synthesize Unicode keystrokes (use if an app blocks paste).
method = "paste"
restore_clipboard = true

[vocab]
# Terms that bias STT recognition AND are used to normalize spelling in cleanup.
# Put names, jargon, and math/technical vocabulary here.
terms = [
    "manifold", "eigenvalue", "Navier-Stokes", "Riemannian",
    "Hörmander", "Sobolev", "quasilinear", "typelessless",
]

[cleanup]
model = "claude-haiku-4-5"
default_mode = "working"

# --- Modes: toggle from the tray icon. Each has its own cleanup prompt. ---

[modes.working]
use_llm = true
prompt = """
You are a dictation post-processor. The user dictates technical/work text that freely mixes English and Chinese, often within one sentence.
Your ONLY job is to lightly clean the transcript:
- Fix punctuation and capitalization.
- Remove disfluencies and fillers (um, uh, 呃, 嗯, 那个, false starts, and immediately repeated words).
- Keep technical terms, code identifiers, names, and math exactly as transcribed.
Absolute rules:
- NEVER translate.
- NEVER replace a word with its equivalent in the other language. If a word was spoken in English keep it in English; if spoken in Chinese keep it in Chinese. For example, do not turn "so" into "所以", or "但是" into "but".
- Do not rephrase, reorder, summarize, or add anything.
Return ONLY the cleaned text — no preamble, labels, or quotation marks.
"""

[modes.chatting]
use_llm = true
prompt = """
You are a dictation post-processor for casual chat and messages that may mix English and Chinese.
- Lightly fix punctuation and drop filler words, but keep the natural, casual tone.
- Do NOT translate. Keep each language as spoken.
Return ONLY the cleaned message text, with no preamble or quotation marks.
"""
